services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  auth-service:
    build:
      context: .
      dockerfile: auth_service/Dockerfile
    env_file:
      - .env
    ports:
      - "8001:8000"

  note-service:
    build:
      context: .
      dockerfile: note_service/Dockerfile
    env_file:
      - .env
    depends_on:
      - rabbitmq
      - auth-service
    ports:
      - "8002:8000"

  notification-service:
    build:
      context: .
      dockerfile: notification_service/Dockerfile
    env_file:
      - .env
    depends_on:
      - rabbitmq
    command: ["python", "main.py"]

  api-gateway:
    build:
      context: .
      dockerfile: api_gateway/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - note-service
